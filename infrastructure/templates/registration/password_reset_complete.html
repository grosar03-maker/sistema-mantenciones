{% extends "base.html" %}
{% load static %}

{% block title %}Contraseña Restablecida - Case{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-[#F8FAFC] via-white to-[#F1F5F9] dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md text-center">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-slate-900/50 border border-slate-100 dark:border-slate-700 p-8 sm:p-10">
            <div class="w-16 h-16 mx-auto mb-6 rounded-2xl bg-green-50 dark:bg-green-900/30 flex items-center justify-center">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-[#0F172A] dark:text-white mb-3">Contraseña Restablecida</h1>
            <p class="text-[#64748B] dark:text-slate-400 leading-relaxed">
                Tu contraseña ha sido cambiada exitosamente.
            </p>
        </div>
        <p class="mt-6 text-sm text-[#64748B] dark:text-slate-400">
            <a href="{% url 'login' %}" class="text-[#CC0000] hover:text-[#990000] font-medium transition-colors duration-200">Iniciar sesión</a>
        </p>
    </div>
</div>
{% endblock %}
