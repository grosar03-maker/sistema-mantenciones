{% extends "base.html" %}
{% load static %}

{% block title %}Registro Cliente - Case{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-[#F8FAFC] via-white to-[#F1F5F9] dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'home' %}" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#CC0000] shadow-lg shadow-red-200 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </a>
            <h1 class="text-2xl font-bold text-[#0F172A] dark:text-white">Registro Cliente</h1>
            <p class="text-[#64748B] dark:text-slate-400 mt-1">Cree su cuenta para solicitar mantenciones</p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-slate-900/50 border border-slate-100 dark:border-slate-700 p-6 sm:p-8">
            <form method="POST" action="{% url 'registro_cliente' %}">
                {% csrf_token %}
                <div class="space-y-5">
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-[#0F172A] dark:text-white mb-1.5">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre"
                            class="w-full px-4 py-2.5 sm:py-3 border-2 border-slate-200 dark:border-slate-600 rounded-xl focus:border-[#CC0000] focus:ring-4 focus:ring-red-50 outline-none transition-all duration-200 bg-white dark:bg-slate-700 text-[#0F172A] dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-sm sm:text-base"
                            placeholder="Ej: Juan Pérez"
                            required>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-[#0F172A] dark:text-white mb-1.5">Correo electrónico</label>
                        <input type="email" id="email" name="email"
                            class="w-full px-4 py-2.5 sm:py-3 border-2 border-slate-200 dark:border-slate-600 rounded-xl focus:border-[#CC0000] focus:ring-4 focus:ring-red-50 outline-none transition-all duration-200 bg-white dark:bg-slate-700 text-[#0F172A] dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-sm sm:text-base"
                            placeholder="Ej: juan@ejemplo.com"
                            required>
                    </div>
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-[#0F172A] dark:text-white mb-1.5">Número telefónico</label>
                        <input type="tel" id="telefono" name="telefono"
                            class="w-full px-4 py-2.5 sm:py-3 border-2 border-slate-200 dark:border-slate-600 rounded-xl focus:border-[#CC0000] focus:ring-4 focus:ring-red-50 outline-none transition-all duration-200 bg-white dark:bg-slate-700 text-[#0F172A] dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-sm sm:text-base"
                            placeholder="Ej: +56 9 1234 5678"
                            required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-[#0F172A] dark:text-white mb-1.5">Contraseña</label>
                        <div class="relative">
                            <input type="password" id="password" name="password"
                                class="w-full px-4 py-2.5 sm:py-3 pr-12 border-2 border-slate-200 dark:border-slate-600 rounded-xl focus:border-[#CC0000] focus:ring-4 focus:ring-red-50 outline-none transition-all duration-200 bg-white dark:bg-slate-700 text-[#0F172A] dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-sm sm:text-base"
                                placeholder="Cree una contraseña"
                                minlength="6"
                                required>
                            <button type="button" onclick="togglePassword('password', this)"
                                class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-[#64748B] dark:text-slate-400 hover:text-[#0F172A] dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-600 transition-all duration-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    {% if error %}
                    <div class="p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-xl flex items-center gap-3">
                        <svg class="w-5 h-5 text-red-500 dark:text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p class="text-sm text-red-700 dark:text-red-300">{{ error }}</p>
                    </div>
                    {% endif %}

                    <button type="submit"
                        class="w-full bg-[#CC0000] text-white py-3 sm:py-3.5 px-6 rounded-xl font-semibold hover:bg-[#990000] transition-all duration-200 shadow-lg shadow-red-200 text-sm sm:text-base">
                        Crear Cuenta
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center mt-6 text-sm text-[#64748B] dark:text-slate-400">
            ¿Ya tiene cuenta?
            <a href="{% url 'login' %}" class="text-[#CC0000] hover:text-[#990000] font-medium transition-colors duration-200">Iniciar Sesión</a>
        </p>
    </div>
</div>
{% endblock %}
