<div class="flex items-center gap-1.5">
    <a href="{% url 'detalle_mecanico' %}" class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-all duration-200 group" title="Mi Cuenta">
        <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-white text-xs font-medium uppercase shrink-0 group-hover:bg-slate-500 transition-colors">
            {{ mecanico.nombre|make_list|first|default:user.username|make_list|first }}
        </div>
        <div class="leading-tight hidden sm:block">
            <p class="text-sm font-medium text-[#0F172A] dark:text-white">{{ mecanico.nombre|default:user.get_full_name|default:user.username }}</p>
            <p class="text-xs text-[#64748B] dark:text-slate-400">{{ mecanico.especialidad|default:"Técnico" }}</p>
        </div>
    </a>
    <a href="{% url 'logout' %}"
       class="flex items-center justify-center w-8 h-8 rounded-lg text-[#64748B] dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#0F172A] dark:hover:text-white transition-all duration-200" title="Cerrar Sesión">
        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
    </a>
</div>
