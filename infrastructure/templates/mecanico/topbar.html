<div class="flex items-center gap-1.5">
    <button type="button" onclick="abrirConfig()"
       class="flex items-center justify-center w-8 h-8 rounded-lg bg-white/70 dark:bg-slate-800/70 text-[#64748B] dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#0F172A] dark:hover:text-white transition-all duration-200 shadow-sm" title="Configuración">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>
    <a href="{% url 'detalle_mecanico' %}" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/70 dark:bg-slate-800/70 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all duration-200 shadow-sm group" title="Mi Cuenta">
        <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-white text-xs font-medium uppercase shrink-0 group-hover:bg-slate-500 transition-colors">
            {{ mecanico.nombre|make_list|first|default:user.username|make_list|first }}
        </div>
        <div class="leading-tight hidden sm:block">
            <p class="text-sm font-medium text-[#0F172A] dark:text-white">{{ mecanico.nombre|default:user.get_full_name|default:user.username }}</p>
            <p class="text-xs text-[#64748B] dark:text-slate-400">{{ mecanico.especialidad|default:"Técnico" }}</p>
        </div>
    </a>
    <a href="{% url 'logout' %}"
       class="flex items-center justify-center w-8 h-8 rounded-lg bg-white/70 dark:bg-slate-800/70 text-[#64748B] dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-[#0F172A] dark:hover:text-white transition-all duration-200 shadow-sm" title="Cerrar Sesión">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
    </a>
</div>
